<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho IPA 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: 'Nunito', sans-serif;
}

/* card */
.card {
    transition: all 0.3s;
}
.card:hover {
    transform: scale(1.03);
}

/* glow */
.glow:hover {
    box-shadow: 0 0 25px rgba(0,255,255,0.3);
}
</style>

</head>

<body class="bg-[#0B0B15] text-white p-4">

<div class="max-w-2xl mx-auto">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-extrabold">🔥 Kho IPA</h1>
        <a href="index.html" class="text-blue-400 text-sm">← Quay lại</a>
    </div>

    <!-- SEARCH -->
    <input type="text" placeholder="Tìm app..."
    class="w-full mb-6 px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:outline-none">

    <!-- LIST -->
    <div id="appList" class="space-y-4">

        <!-- APP -->
        <div class="flex items-center gap-4 p-3 bg-white/5 rounded-2xl card glow">

            <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple126/v4/8a/1b/ff/sample.jpg/512x512bb.jpg"
            class="w-16 h-16 rounded-xl">

            <div class="flex-1">
                <div class="font-bold">
                    TikTok++
                    <span class="text-[10px] bg-pink-500 px-2 py-0.5 rounded-full ml-2">HOT</span>
                </div>
                <div class="text-sm text-gray-400">Không quảng cáo</div>
            </div>

            <a href="#"
            class="bg-blue-500/20 text-blue-400 px-4 py-1.5 rounded-full text-sm font-bold hover:bg-blue-500 hover:text-white transition">
            GET
            </a>

        </div>

        <!-- APP -->
        <div class="flex items-center gap-4 p-3 bg-white/5 rounded-2xl card glow">

            <img src="https://is1-ssl.mzstatic.com/image/thumb/Purple116/sample.jpg/512x512bb.jpg"
            class="w-16 h-16 rounded-xl">

            <div class="flex-1">
                <div class="font-bold">YouTube++</div>
                <div class="text-sm text-gray-400">Xem không quảng cáo</div>
            </div>

            <a href="#"
            class="bg-blue-500/20 text-blue-400 px-4 py-1.5 rounded-full text-sm font-bold hover:bg-blue-500 hover:text-white transition">
            GET
            </a>

        </div>

    </div>

</div>

<!-- SEARCH SCRIPT -->
<script>
const searchInput = document.querySelector("input");
const apps = document.querySelectorAll("#appList > div");

searchInput.addEventListener("keyup", function() {
    let value = this.value.toLowerCase();

    apps.forEach(app => {
        let text = app.innerText.toLowerCase();
        app.style.display = text.includes(value) ? "flex" : "none";
    });
});
</script>

</body>
</html>
