<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư viện IPA 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    font-family: 'Nunito', sans-serif;
    background: #0B0B15;
}

/* card */
.card {
    transition: all 0.3s;
}
.card:hover {
    transform: scale(1.03);
}

/* glow */
.glow:hover {
    box-shadow: 0 0 25px rgba(0,255,255,0.3);
}
</style>

</head>

<body class="bg-[#0B0B15] text-white p-4">

<div class="max-w-2xl mx-auto">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-extrabold">🔥 Kho IPA Free</h1>
        <a href="https://mrpewios.github.io" class="text-blue-400 text-sm">← Quay lại trang chủ</a>
    </div>

    <!-- SEARCH -->
    <input type="text" id="searchInput" placeholder="Tìm app..."
    class="w-full mb-6 px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:outline-none focus:border-blue-500">

    <!-- LIST -->
    <div id="appList" class="space-y-4">

        <!-- APP 1: TikTok++ -->
        <div class="flex items-center gap-4 p-3 bg-white/5 rounded-2xl card glow">
            <img src="https://mrpewios.github.io/tiktok.webp"
            class="w-16 h-16 rounded-xl" onerror="this.src='https://www.mediafire.com/file/92le3jwnrsfyu1h/TikTokVibe.ipa/file'">
            <div class="flex-1">
                <div class="font-bold">
                    TikTok++
                    <span class="text-[10px] bg-pink-500 px-2 py-0.5 rounded-full ml-2">HOT</span>
                </div>
                <div class="text-sm text-gray-400">Không qc, tải video kh qc, ẩn danh</div>
            </div>
            <a href="https://www.mediafire.com/file/92le3jwnrsfyu1h/TikTokVibe.ipa/file" class="bg-blue-500/20 text-blue-400 px-4 py-1.5 rounded-full text-sm font-bold hover:bg-blue-500 hover:text-white transition">
                GET
            </a>
        </div>

        <!-- APP 2: Palera1n Roothide -->
        <div class="flex items-center gap-4 p-3 bg-white/5 rounded-2xl card glow">
            <img src="https://mrpewios.github.io/palera1n.webp"
            class="w-16 h-16 rounded-xl" onerror="this.src='https://via.placeholder.com/64?text=Palera1n'">
            <div class="flex-1">
                <div class="font-bold">Palera1n Roothide</div>
                <div class="text-sm text-gray-400">Ẩn Jailbreak cho máy.Hỗ trợ A8-A11.Pass file rar:123</div>
            </div>
            <a href="https://www.mediafire.com/file/gu4k90bdncc4nyi/Winra1n+2.1+-+Palera1n+Windows.rar/file" target="_blank" class="bg-blue-500/20 text-blue-400 px-4 py-1.5 rounded-full text-sm font-bold hover:bg-blue-500 hover:text-white transition">
                GET
            </a>
        </div>

    </div>

    <!-- Nút Donate -->
    <div class="text-center mt-10">
        <a href="https://mrpewios.github.io/donate.html"
        class="bg-pink-500 px-6 py-3 rounded-full font-bold hover:scale-110 transition inline-block">
        ❤️ Ủng hộ tôi 1 ly cafe
        </a>
    </div>

    <!-- Footer -->
    <div class="text-center text-gray-500 text-sm mt-12 pb-6">
        Copyright © 2026 - 2031 QuangGiap • MrPewiOS Repo 👑
    </div>

</div>

<script>
// SCRIPT TÌM KIẾM
const searchInput = document.getElementById("searchInput");
const appItems = document.querySelectorAll("#appList > div");

// Hàm lọc app
function filterApps() {
    const keyword = searchInput.value.toLowerCase().trim();
    
    appItems.forEach(item => {
        const text = item.innerText.toLowerCase();
        if (keyword === "" || text.includes(keyword)) {
            item.style.display = "flex";
        } else {
            item.style.display = "none";
        }
    });
}

// Lắng nghe sự kiện gõ phím
searchInput.addEventListener("keyup", filterApps);
</script>

</body>
</html>
